name: Discord Webhook Notification

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, closed, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published, edited, released]
  check_run:
    types: [completed]
  check_suite:
    types: [completed]
  deployment:
  deployment_status:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send Notification to Discord
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          # Push
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          # PR
          PR_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          # PR Review
          REVIEW_STATE: ${{ github.event.review.state }}
          # Issue
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          # Release
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          # Check Run
          CHECK_NAME: ${{ github.event.check_run.name }}
          CHECK_STATUS: ${{ github.event.check_run.status }}
          CHECK_CONCLUSION: ${{ github.event.check_run.conclusion }}
          # Check Suite
          SUITE_STATUS: ${{ github.event.check_suite.status }}
          SUITE_CONCLUSION: ${{ github.event.check_suite.conclusion }}
          # Deployment
          DEPLOY_ENV: ${{ github.event.deployment.environment }}
          DEPLOY_STATUS: ${{ github.event.deployment_status.state }}
          # Secrets
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Error: DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

          CONTENT=""

          case "$EVENT_NAME" in
            push)
              CONTENT=$(printf 'ЁЯЪА **Push Event** in `%s` by **%s**\n\nBranch: `%s`\nCommit: [`%s`](%s)' \
                "$REPOSITORY" "$ACTOR" "$REF_NAME" "$SHA" "$COMMIT_URL")
              ;;
            pull_request)
              LABEL="${PR_ACTION^}"
              CONTENT=$(printf 'ЁЯУЛ **Pull Request %s** in `%s` by **%s**\n\n[#%s: %s](%s)' \
                "$LABEL" "$REPOSITORY" "$ACTOR" "$PR_NUMBER" "$PR_TITLE" "$PR_URL")
              ;;
            pull_request_review)
              LABEL="${REVIEW_STATE^}"
              CONTENT=$(printf 'ЁЯСА **Pull Request Review %s** in `%s` by **%s**\n\n[#%s: %s](%s)' \
                "$LABEL" "$REPOSITORY" "$ACTOR" "$PR_NUMBER" "$PR_TITLE" "$PR_URL")
              ;;
            issues)
              LABEL="${PR_ACTION^}"
              CONTENT=$(printf 'ЁЯРЫ **Issue %s** in `%s` by **%s**\n\n[#%s: %s](%s)' \
                "$LABEL" "$REPOSITORY" "$ACTOR" "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_URL")
              ;;
            release)
              LABEL="${PR_ACTION^}"
              CONTENT=$(printf 'ЁЯОЙ **Release %s** in `%s`\n\n[%s (%s)](%s)' \
                "$LABEL" "$REPOSITORY" "$RELEASE_NAME" "$RELEASE_TAG" "$RELEASE_URL")
              ;;
            check_run)
              CONTENT=$(printf 'тЬЕ **Check Run Completed** in `%s`\n\nCheck: `%s`\nStatus: %s\nResult: %s' \
                "$REPOSITORY" "$CHECK_NAME" "$CHECK_STATUS" "$CHECK_CONCLUSION")
              ;;
            check_suite)
              CONTENT=$(printf 'ЁЯУК **Check Suite Completed** in `%s`\n\nStatus: %s\nResult: %s' \
                "$REPOSITORY" "$SUITE_STATUS" "$SUITE_CONCLUSION")
              ;;
            deployment|deployment_status)
              if [ "$EVENT_NAME" = "deployment_status" ]; then
                STATUS_UPPER="${DEPLOY_STATUS^^}"
                CONTENT=$(printf 'ЁЯЪА **Deployment Status: %s** in `%s`\n\nEnvironment: `%s`' \
                  "$STATUS_UPPER" "$REPOSITORY" "$DEPLOY_ENV")
              else
                CONTENT=$(printf 'ЁЯЪА **Deployment Created** in `%s`\n\nEnvironment: `%s`' \
                  "$REPOSITORY" "$DEPLOY_ENV")
              fi
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME"
              exit 0
              ;;
          esac

          if [ -n "$CONTENT" ]; then
            PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
            curl -sfS -X POST \
                 -H "Content-Type: application/json" \
                 -d "$PAYLOAD" \
                 "$DISCORD_WEBHOOK_URL"
          fi
